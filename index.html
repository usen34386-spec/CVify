<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live CV Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- LEFT SIDE: THE EDITOR -->
        <div class="editor-panel">
            <h2>1. Edit Your Details</h2>
            <form id="cv-form">
                
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="inpName" placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label>Job Title</label>
                    <input type="text" id="inpTitle" placeholder="Software Engineer">
                </div>

                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" id="inpPhone" placeholder="+1 234 567 890">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="inpEmail" placeholder="john@example.com">
                </div>

                <div class="form-group">
                    <label>Summary</label>
                    <textarea id="inpSummary" rows="4" placeholder="Write a brief professional summary..."></textarea>
                </div>

                <div class="form-group">
                    <label>Skills (Comma separated)</label>
                    <input type="text" id="inpSkills" placeholder="HTML, CSS, JavaScript, Python">
                </div>

                <div class="form-group">
                    <label>Work Experience</label>
                    <textarea id="inpExp" rows="4" placeholder="Company Name - Role - Year"></textarea>
                </div>
                
                <div class="form-group">
                    <label>Education</label>
                    <textarea id="inpEdu" rows="3" placeholder="University Name - Degree"></textarea>
                </div>

                <button type="button" onclick="window.print()">Download PDF</button>
            </form>
        </div>

        <!-- RIGHT SIDE: THE PREVIEW -->
        <div class="preview-panel">
            <div id="cv-template">
                <div class="header">
                    <h1 id="outName">Your Name</h1>
                    <h3 id="outTitle">Job Title</h3>
                </div>
                
                <div class="contact-info">
                    <span id="outPhone">Phone</span> | 
                    <span id="outEmail">Email</span>
                </div>

                <div class="section">
                    <h4>Professional Summary</h4>
                    <p id="outSummary">A passionate professional ready to work.</p>
                </div>

                <div class="section">
                    <h4>Skills</h4>
                    <ul id="outSkills">
                        <li>Skill 1</li>
                        <li>Skill 2</li>
                    </ul>
                </div>

                <div class="section">
                    <h4>Experience</h4>
                    <p id="outExp" style="white-space: pre-line;">Work experience details...</p>
                </div>

                <div class="section">
                    <h4>Education</h4>
                    <p id="outEdu" style="white-space: pre-line;">Education details...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
